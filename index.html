<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clickbait Crab</title>

<style>
body{
  font-family: monospace;
  background:#f5f5f5;
  text-align:center;
}

/* TITLE */
h1{
  margin-top:40px;
  font-size:32px;
}

.red{ color:#d33; }

.tagline{
  margin-top:10px;
  color:#555;
}

/* INPUT */
.input-box{
  margin:30px auto;
  width:500px;
  border:2px solid #333;
  background:white;
  padding:10px;
}

textarea{
  width:100%;
  height:80px;
  border:none;
  outline:none;
  font-family:monospace;
}

button{
  margin-top:10px;
  padding:6px 12px;
  cursor:pointer;
}

/* CRAB MESSAGE */
.crab{
  margin-top:15px;
  color:#444;
}

/* RESULT */
.result{
  margin:30px auto;
  width:500px;
  border:2px solid #333;
  background:white;
  padding:15px;
  text-align:left;
}

.label{
  font-size:12px;
  color:#888;
  margin-bottom:5px;
}

.singlish{
  margin-top:10px;
  color:#666;
  font-size:13px;
}

/* ACTIONS */
.actions{
  margin-top:10px;
}
.actions button{
  margin:5px;
}
</style>
</head>

<body>

<h1>
🦀 Clickbait Crab
</h1>

<div class="tagline">
This one not normal AI. I calm down your titles.
</div>

<div class="input-box">
<textarea id="input" placeholder="Paste a crazy YouTube title..."></textarea>
<button onclick="process()">SEND</button>
</div>

<div class="crab" id="crab"></div>

<div class="result" id="result" style="display:none;">
  <div class="label">CALM VERSION</div>
  <div id="clean"></div>

  <div class="singlish" id="singlish"></div>

  <div class="actions">
    <button onclick="reset()">TRY ANOTHER</button>
    <button onclick="copy()">COPY</button>
    <button onclick="openCoThink()">OPEN COTHINK</button>
  </div>
</div>

<script>

function isClickbait(text){
  return /(!{2,}|[A-Z]{4,}|😱|🔥|💰|shocking|insane|destroyed|won’t believe)/i.test(text);
}

const crabLines = [
  "🦀 Wah this one drama sia.",
  "🦀 This title shouting at me.",
  "🦀 Relax lah… I translate properly."
];

function process(){
  const val = document.getElementById("input").value;

  if(!val) return;

  const crab = document.getElementById("crab");
  const clean = document.getElementById("clean");
  const singlish = document.getElementById("singlish");
  const result = document.getElementById("result");

  if(isClickbait(val)){
    crab.innerText = crabLines[Math.floor(Math.random()*crabLines.length)];
  } else {
    crab.innerText = "🦀 Not too bad… I still clean it.";
  }

  // VERY SIMPLE TRANSFORM (you can replace later with API)
  const calm = val
    .replace(/😱|🔥|💰/g,'')
    .replace(/!/g,'')
    .replace(/\b(DESTROY|INSANE|SHOCKING)\b/gi,'significant')
    .replace(/[A-Z]{3,}/g, m => m.toLowerCase());

  clean.innerText = calm;

  singlish.innerText = "Singlish: " + calm + " lah.";

  result.style.display = "block";
}

function reset(){
  document.getElementById("input").value="";
  document.getElementById("result").style.display="none";
  document.getElementById("crab").innerText="";
}

function copy(){
  const text = document.getElementById("clean").innerText;
  navigator.clipboard.writeText(text);
}

function openCoThink(){
  window.open("https://canornot.co");
}

</script>

</body>
</html>
